services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auracxeli
      MYSQL_USER: auracxeli
      MYSQL_PASSWORD: auracxeli
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/auracxeli
      SPRING_DATASOURCE_USERNAME: auracxeli
      SPRING_DATASOURCE_PASSWORD: auracxeli
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:

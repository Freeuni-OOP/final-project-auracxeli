<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ქართული სიტყვების თამაშები</title>
    <link th:href="@{/css/styles.css}"  href="/static/css/styles.css"  rel="stylesheet" />
    <link th:href="@{/css/landing.css}" href="/static/css/landing.css" rel="stylesheet" />
</head>

<body>
<header class="site-header">
    <nav th:replace="~{fragments/navbar :: navbar('')}"></nav>
</header>

<main>
    <section class="hero container">
        <h1>აირჩიე თამაში</h1>
        <p>ითამაშე Wordle და Connections ქართულ ენაზე</p>
    </section>

    <section class="games container">
        <a class="game-card" th:href="@{/wordle}">
            <div class="tiles">
                <span class="t g">ბ</span>
                <span class="t x">უ</span>
                <span class="t y">რ</span>
                <span class="t x">თ</span>
                <span class="t g">ი</span>
            </div>
            <h2>Wordle</h2>
            <p>გამოიცანი დღის 5-ასოიანი ქართული სიტყვა 6 მცდელობაში.</p>
        </a>

        <a class="game-card" href="connections">
            <div class="mini">
                <i></i><i></i><i></i><i></i>
            </div>
            <h2>Connections</h2>
            <p>დააჯგუფე 16 სიტყვა 4 თემატურ კატეგორიად. სამი შეცდომის უფლება გაქვს.</p>
        </a>
    </section>
</main>
</body>
</html>

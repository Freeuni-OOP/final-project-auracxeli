<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ადმინი — Connections</title>
    <link th:href="@{/css/styles.css}" href="/static/css/styles.css" rel="stylesheet" />
    <link th:href="@{/css/auth.css}"   href="/static/css/auth.css"   rel="stylesheet" />
    <style>
        .wide-form {
            max-width: 960px;
        }
        .groups-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 700px) {
            .groups-grid {
                grid-template-columns: 1fr;
            }
        }
        .group-card {
            border-radius: var(--radius);
            padding: 20px;
        }
        .group-title {
            font-weight: 700;
            margin-bottom: 12px;
        }
        .group-card:nth-child(1) { background: rgba(106, 170, 100, 0.18); } /* green */
        .group-card:nth-child(2) { background: rgba(201, 180, 88, 0.22); }  /* yellow */
        .group-card:nth-child(3) { background: rgba(90, 143, 214, 0.18); }  /* blue */
        .group-card:nth-child(4) { background: rgba(154, 109, 215, 0.18); } /* purple */
        .field select {
            padding: 10px 12px;
            border: 1px solid var(--line);
            border-radius: 8px;
            font-size: 15px;
            font-family: var(--font);
            background: var(--surface);
            margin-bottom: 8px;
        }
        .field select:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }
        .diff-pill {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            margin: 2px 4px 2px 0;
            font-size: 13px;
            font-weight: 600;
        }
        .diff-pill.diff-1 { background: rgba(106, 170, 100, 0.25); } /* green */
        .diff-pill.diff-2 { background: rgba(201, 180, 88, 0.3); }   /* yellow */
        .diff-pill.diff-3 { background: rgba(90, 143, 214, 0.25); }  /* blue */
        .diff-pill.diff-4 { background: rgba(154, 109, 215, 0.25); } /* purple */
        .word-field {
            margin-bottom: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
        }
        td:nth-child(2), th:nth-child(2) {
            padding-left: 40px;
        }
    </style>
</head>
<body>
<header class="site-header">
    <nav th:replace="~{fragments/navbar :: navbar('')}"></nav>
</header>
<main class="container">
    <section class="auth wide-form">
        <h1>Connections-ის დამატება</h1>
        <p class="alt" th:if="${message}" th:text="${message}"></p>

        <form th:object="${createConnectionsPuzzleRequest}" th:action="@{/admin/connections}" method="post" novalidate>
            <div class="field">
                <label for="puzzleDate">თარიღი</label>
                <input type="date" id="puzzleDate" th:field="*{puzzleDate}" />
                <span class="error" th:if="${#fields.hasErrors('puzzleDate')}" th:errors="*{puzzleDate}"></span>
            </div>
            <span class="error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></span>

            <div class="groups-grid">
                <div th:each="group, groupStat : *{groups}" class="field group-card">
                    <div class="group-title">ჯგუფი <span th:text="${groupStat.count}">1</span></div>

                    <label>კატეგორია</label>
                    <input type="text" th:field="*{groups[__${groupStat.index}__].category}" />
                    <span class="error"
                          th:if="${#fields.hasErrors('groups[' + groupStat.index + '].category')}"
                          th:errors="*{groups[__${groupStat.index}__].category}"></span>

                    <label>სირთულე</label>
                    <select th:field="*{groups[__${groupStat.index}__].difficulty}">
                        <option value="1">ადვილი</option>
                        <option value="2">საშუალო</option>
                        <option value="3">რთული</option>
                        <option value="4">ურთულესი</option>
                    </select>

                    <div th:each="word, wordStat : ${group.words}" class="word-field">
                        <label>სიტყვა <span th:text="${wordStat.count}">1</span></label>
                        <input type="text" th:field="*{groups[__${groupStat.index}__].words[__${wordStat.index}__]}" />
                    </div>
                    <span class="error"
                          th:if="${#fields.hasErrors('groups[' + groupStat.index + '].words')}"
                          th:errors="*{groups[__${groupStat.index}__].words}"></span>
                </div>
            </div>

            <button type="submit">დამატება</button>
        </form>
    </section>

    <section class="auth wide-form">
        <h2>დაგეგმილი პაზლები</h2>
        <table>
            <thead>
            <tr>
                <th>თარიღი</th>
                <th>კატეგორიები</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${puzzles}">
                <td th:text="${p.puzzleDate}">2026-06-23</td>
                <td>
                    <span th:each="g : ${p.groups}"
                          th:class="${'diff-pill diff-' + g.difficulty}"
                          th:text="${g.category}">კატეგორია</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(puzzles)}">
                <td colspan="2">დაგეგმილი პაზლი არ არის</td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>

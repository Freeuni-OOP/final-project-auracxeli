<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>პროფილი</title>
    <link th:href="@{/css/styles.css}"  href="/static/css/styles.css"  rel="stylesheet" />
    <link th:href="@{/css/profile.css}" href="/static/css/profile.css" rel="stylesheet" />
</head>
<body>
<header class="site-header">
    <div class="container">
        <a class="brand" th:href="@{/}">WORDLE</a>
        <form th:action="@{/logout}" method="post" class="logout-form">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit">გასვლა</button>
        </form>
    </div>
</header>

<main>
    <section class="profile container">
        <h1 th:text="${username}">Profile</h1>
        <p class="subtitle">შენი სტატისტიკა</p>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-value" th:text="${stats.gamesPlayed}">0</span>
                <span class="stat-label">ნათამაშები</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" th:text="|${stats.winPercent}%|">0%</span>
                <span class="stat-label">მოგების პროცენტულობა</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" th:text="${stats.currentStreak}">0</span>
                <span class="stat-label">მიმდინარე Streak</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" th:text="${stats.maxStreak}">0</span>
                <span class="stat-label">მაქსიმალური Streak</span>
            </div>
        </div>
    </section>
</main>
</body>
</html>

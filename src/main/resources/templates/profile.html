<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>პროფილი</title>
    <link th:href="@{/css/styles.css}"  href="/static/css/styles.css"  rel="stylesheet" />
    <link th:href="@{/css/profile.css}" href="/static/css/profile.css" rel="stylesheet" />
</head>
<body>
<header class="site-header">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
</header>

<main>
    <section class="profile container">
        <div class="profile-identity">
            <div class="avatar" th:text="${profile.initials}">A</div>
            <div class="identity-text">
                <h1 th:text="${profile.username}">username</h1>
                <p class="join-date">
                    შემოგვიერთდა: <span th:text="${profile.joinDate}">2026-01-01</span>
                </p>
            </div>
        </div>

        <section class="game-stats">
            <h2 class="game-title">Wordle</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" th:text="${profile.wordleStats.gamesPlayed}">0</span>
                    <span class="stat-label">ნათამაშები</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" th:text="|${profile.wordleStats.winPercent}%|">0%</span>
                    <span class="stat-label">მოგების პროცენტულობა</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" th:text="${profile.wordleStats.currentStreak}">0</span>
                    <span class="stat-label">მიმდინარე Streak</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" th:text="${profile.wordleStats.maxStreak}">0</span>
                    <span class="stat-label">მაქსიმალური Streak</span>
                </div>
            </div>
        </section>

        <section class="guess-distribution">
            <h2 class="game-title">გამოცნობების განაწილება</h2>

            <p th:if="${profile.wordleStats.gamesPlayed == 0}" class="placeholder">
                ჯერ არ გითამაშია - სტატისტიკა აქ გამოჩნდება.
            </p>

            <div th:unless="${profile.wordleStats.gamesPlayed == 0}" class="dist-chart">
                <div class="dist-row" th:each="bar : ${profile.guessDistribution}">
                    <span class="dist-label" th:text="|#${bar.guesses}|">#1</span>
                    <div class="dist-track">
                        <div class="dist-bar" th:style="'width:' + ${bar.percent} + '%'"></div>
                    </div>
                    <span class="dist-count" th:text="${bar.count}">0</span>
                </div>
            </div>
        </section>

        <section class="game-history">
            <h2 class="game-title">თამაშების ისტორია</h2>
            <p class="placeholder">მალე დაემატება.</p>
        </section>

        <!-- Connections stats section will be added here later -->
    </section>
</main>
</body>
</html>

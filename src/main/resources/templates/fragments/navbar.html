<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
</head>
<body>
<nav th:fragment="navbar" class="container navbar">
    <a class="nav-link" th:href="@{/profile}" sec:authorize="isAuthenticated()">პროფილი</a>
    <form th:action="@{/logout}" method="post" class="logout-form" sec:authorize="isAuthenticated()">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit">გასვლა</button>
    </form>
</nav>
</body>
</html>

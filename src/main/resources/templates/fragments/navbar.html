<nav th:fragment="navbar(activePage)" xmlns:th="http://www.thymeleaf.org"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="container navbar">
    <a class="brand" th:href="@{/}">
        <img th:src="${theme == 'dark'} ? @{/images/logo-dark.png} : @{/images/logo.png}"
             alt="Auracxeli" class="brand-logo" />
    </a>

    <div class="nav-links">
        <a th:href="@{/profile/avatar}" sec:authorize="isAuthenticated()"
           th:if="${#authentication.principal instanceof T(com.auracxeli.user.UserDetailsImpl)}">
            <img th:src="@{'/images/avatars/' + ${#authentication.principal.avatar}}"
                 class="nav-avatar" alt="avatar" />
        </a>
        <div class="level-badge" sec:authorize="isAuthenticated()" th:if="${levelInfo != null}">
            <span class="level-badge-label" th:text="|Lv. ${levelInfo.level}|">Lv. 1</span>
            <div class="level-badge-track">
                <div class="level-badge-fill" th:style="'width:' + ${levelInfo.percentComplete} + '%'"></div>
            </div>
        </div>
        <div class="nav-dropdown" sec:authorize="isAuthenticated()">
            <span class="nav-link nav-dropdown-toggle"
                  th:classappend="${activePage == 'archive'} ? 'active' : ''">არქივი ▾</span>
            <div class="nav-dropdown-menu">
                <a class="nav-dropdown-item" th:href="@{/archive/wordle}">Wordle</a>
                <a class="nav-dropdown-item" th:href="@{/archive/connections}">Connections</a>
            </div>
        </div>
        <a class="nav-link"
           th:classappend="${activePage == 'friends'} ? 'active' : ''"
           th:href="@{/friends}"
           sec:authorize="isAuthenticated()">მეგობრები</a>
        <a class="nav-link"
           th:classappend="${activePage == 'leaderboard'} ? 'active' : ''"
           th:href="@{/friends/leaderboard/wordle}"
           sec:authorize="isAuthenticated()">ლიდერბორდი</a>
        <a class="nav-link"
           th:classappend="${activePage == 'profile'} ? 'active' : ''"
           th:href="@{/profile}"
           sec:authorize="isAuthenticated()">პროფილი</a>
        <form th:action="@{/theme/toggle}" method="post" class="theme-form" sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="theme-toggle"
                    th:title="${theme == 'dark'} ? 'ღია ფონი' : 'მუქი ფონი'"
                    th:text="${theme == 'dark'} ? '☀' : '🌙'">🌙</button>
        </form>
        <form th:action="@{/logout}" method="post" class="logout-form" sec:authorize="isAuthenticated()">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit">გასვლა</button>
        </form>
    </div>
</nav>

<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>შეცდომა</title>
    <link th:href="@{/css/styles.css}" href="/static/css/styles.css" rel="stylesheet"/>
    <link th:href="@{/css/error.css}" href="/static/css/error.css" rel="stylesheet"/>
</head>
<body>
<main class="error-page">
    <img th:src="@{/images/logo.png}" src="/static/images/logo.png" alt="Auracxeli" class="error-logo"/>
    <h1 class="error-code" th:text="${status} ?: 'შეცდომა'">500</h1>
    <p class="error-title">დაფიქსირდა შეცდომა</p>
    <p class="error-message">რაღაც არასწორად წავიდა. სცადეთ მოგვიანებით ან დაბრუნდით მთავარ გვერდზე.</p>
    <a th:href="@{/}" href="/" class="error-home">მთავარ გვერდზე</a>
</main>
</body>
</html>

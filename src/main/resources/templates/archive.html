<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${gameTitle} + ' - არქივი'">არქივი</title>
    <link th:href="@{/css/styles.css}" href="/static/css/styles.css" rel="stylesheet"/>
    <link th:href="@{/css/archive.css}" href="/static/css/archive.css" rel="stylesheet"/>
</head>
<body>
<header class="site-header">
    <nav th:replace="~{fragments/navbar :: navbar('archive')}"></nav>
</header>
<main>
    <section class="container archive">
        <h1 class="archive-title" th:text="${gameTitle} + ' - წარსული თამაშები'">არქივი</h1>
        <p class="archive-sub">აირჩიე თარიღი და ივარჯიშე. სავარჯიშო თამაშები არ აისახება სტატისტიკასა და სერიაზე.</p>

        <p th:if="${#lists.isEmpty(dates)}" class="archive-empty">ჯერ არცერთი თამაში არ არის დაგეგმილი.</p>

        <div class="archive-grid" th:unless="${#lists.isEmpty(dates)}">
            <a th:each="d : ${dates}" class="archive-card"
               th:href="@{|${basePath}/${d}|}" th:text="${d}">2026-06-15</a>
        </div>
    </section>
</main>
</body>
</html>

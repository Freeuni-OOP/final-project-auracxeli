<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>შესვლა</title>
    <link th:href="@{/css/styles.css}" href="/static/css/styles.css" rel="stylesheet"/>
    <link th:href="@{/css/auth.css}" href="/static/css/auth.css" rel="stylesheet"/>
</head>
<body>
<header class="site-header">
    <div class="container"></div>
</header>
<main>
    <section class="auth">
        <h1>შესვლა</h1>
        <p class="error" th:if="${param.error}">მომხმარებლის სახელი ან პაროლი არასწორია</p>
        <form th:action="@{/login}" method="post" novalidate>
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="field">
                <label for="username">მომხმარებლის სახელი</label>
                <input type="text" id="username" name="username"/>
            </div>
            <div class="field">
                <label for="password">პაროლი</label>
                <input type="password" id="password" name="password"/>
            </div>
            <button type="submit">შესვლა</button>
        </form>
        <p class="alt">არ გაქვს ანგარიში? <a th:href="@{/register}">რეგისტრაცია</a></p>
    </section>
</main>
</body>
</html>

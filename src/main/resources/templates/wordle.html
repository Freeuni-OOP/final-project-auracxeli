<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Wordle</title>
    <link th:href="@{/css/styles.css}" href="/static/css/styles.css" rel="stylesheet"/>
    <link th:href="@{/css/wordle.css}" href="/static/css/wordle.css" rel="stylesheet"/>
</head>
<body>
<header class="site-header">
    <div class="container">
        <h1 th:href="@{/}">Wordle</h1>
    </div>
</header>
<main>
    <section class="container">
        <div th:if="${noPuzzle}">
            <p>დღეს სიტყვა არ არის დაგეგმილი.</p>
        </div>

        <div th:unless="${noPuzzle}">
            <p th:if="${error}" class="wordle-error" th:text="${error}"></p>

            <p th:if="${outcome != null and outcome.name() == 'WON'}" class="wordle-message win">გილოცავ! გამოიცანი სიტყვა!</p>
            <p th:if="${outcome != null and outcome.name() == 'LOST'}" class="wordle-message lose">
                წააგე. სიტყვა იყო: <span th:text="${revealedWord}"></span>
            </p>

            <div class="wordle-board" id="wordle-board">
                <div class="wordle-row" th:each="row : ${rows}">
                    <span class="t" th:each="tile : ${row}" th:class="${tile.cssClass}" th:text="${tile.letter}"></span>
                </div>
            </div>
            <div th:if="${readOnly}" class="wordle-result">
                <p class="wordle-attempts">
                    ცდები: <span id="attempts-used" th:text="${attemptsUsed}"></span>/<span id="max-attempts" th:text="${maxAttempts}"></span>
                </p>
                <button type="button" id="share-button" class="wordle-share-btn">გაზიარება</button>
                <p id="share-feedback" class="wordle-share-feedback" aria-live="polite"></p>
            </div>
            <form th:unless="${readOnly}" class="wordle-form" th:action="@{/wordle/guess}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="text" name="guess" required="required" minlength="5" maxlength="5" autocomplete="off" autofocus="autofocus"/>
                <button type="submit">გამოცნობა</button>
            </form>
        </div>
    </section>
</main>
<script th:inline="none">
    document.getElementById('share-button')?.addEventListener('click', getWordleEmoji);

    function getWordleEmoji() {
        const rows = document.querySelectorAll('#wordle-board .wordle-row');
        const lines = [];

        rows.forEach(function (row) {
            const tiles = row.querySelectorAll('.t');
            let line = '';
            let hasLetter = false;

            tiles.forEach(function (tile) {
                if (tile.classList.contains('g')) {
                    line += '🟩';
                    hasLetter = true;
                } else if (tile.classList.contains('y')) {
                    line += '🟨';
                    hasLetter = true;
                } else if (tile.classList.contains('x')) {
                    line += '⬜';
                    hasLetter = true;
                }
            });

            if (hasLetter) {
                lines.push(line);
            }
        });

        const attemptsUsed = document.getElementById('attempts-used').textContent;
        const maxAttempts = document.getElementById('max-attempts').textContent;
        const header = 'ცდები ' + attemptsUsed + '/' + maxAttempts;

        const grid = header + '\n\n' + lines.join('\n');
        const feedback = document.getElementById('share-feedback');

        navigator.clipboard.writeText(grid)
            .then(function () {
                feedback.textContent = 'დაკოპირდა!';
            })
            .catch(function () {
                feedback.textContent = 'კოპირება ვერ მოხერხდა';
            });
    }
</script>
</body>
</html>

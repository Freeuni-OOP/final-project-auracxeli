<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Wordle</title>
    <link th:href="@{/css/styles.css}" href="/static/css/styles.css" rel="stylesheet"/>
    <link th:href="@{/css/wordle.css}" href="/static/css/wordle.css" rel="stylesheet"/>
</head>
<body>
<header class="site-header">
    <nav th:replace="~{fragments/navbar :: navbar('')}"></nav>
</header>
<main class="wordle-main">
    <section class="container wordle-container">
        <div th:if="${noPuzzle}">
            <p>დღეს სიტყვა არ არის დაგეგმილი.</p>
        </div>

        <div th:unless="${noPuzzle}">
            <div th:if="${practiceDate != null}" class="practice-bar">
                <a th:href="@{/archive/wordle}">← არქივი</a>
                <span class="practice-date" th:text="${practiceDate}"></span>
                <a th:href="@{/archive/wordle/{d}/restart(d=${practiceDate})}">თავიდან</a>
            </div>
            <p th:if="${error}" class="wordle-error" th:text="${error}"></p>

            <p th:if="${outcome != null and outcome.name() == 'WON'}" class="wordle-message win">გილოცავ! გამოიცანი სიტყვა!</p>
            <p th:if="${outcome != null and outcome.name() == 'LOST'}" class="wordle-message lose">
                წააგე. სიტყვა იყო: <span th:text="${revealedWord}"></span>
            </p>

            <div class="wordle-board" id="wordle-board" th:attr="data-active-row=${attemptsUsed}">
                <div class="wordle-row" th:each="row, rowStat : ${rows}" th:attr="data-row-index=${rowStat.index}">
                    <span class="t" th:each="tile : ${row}" th:class="${tile.cssClass}" th:text="${tile.letter}"></span>
                </div>
            </div>
            <div th:if="${readOnly}" class="wordle-result">
                <p class="wordle-attempts">
                    ცდები: <span id="attempts-used" th:text="${attemptsUsed}"></span>/<span id="max-attempts" th:text="${maxAttempts}"></span>
                </p>
                <button type="button" id="share-button" class="wordle-share-btn">გაზიარება</button>
                <p id="share-feedback" class="wordle-share-feedback" aria-live="polite"></p>
            </div>
            <p id="js-error" class="wordle-error" style="display:none;"></p>
            <form th:unless="${readOnly}" id="guess-form" class="wordle-form"
                  th:action="${practiceDate != null} ? @{/archive/wordle/{d}/guess(d=${practiceDate})} : @{/wordle/guess}"
                  method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" id="guess-input" name="guess"/>
            </form>
            <!-- On-screen Georgian keyboard -->
            <div id="geo-keyboard" class="geo-keyboard">
                <div class="geo-keyboard-row">
                    <button class="geo-key" data-key="ქ">ქ</button>
                    <button class="geo-key" data-key="წ">წ</button>
                    <button class="geo-key" data-key="ე">ე</button>
                    <button class="geo-key" data-key="რ">რ</button>
                    <button class="geo-key" data-key="ტ">ტ</button>
                    <button class="geo-key" data-key="ყ">ყ</button>
                    <button class="geo-key" data-key="უ">უ</button>
                    <button class="geo-key" data-key="ი">ი</button>
                    <button class="geo-key" data-key="ო">ო</button>
                    <button class="geo-key" data-key="პ">პ</button>
                </div>
                <div class="geo-keyboard-row">
                    <button class="geo-key" data-key="ა">ა</button>
                    <button class="geo-key" data-key="ს">ს</button>
                    <button class="geo-key" data-key="დ">დ</button>
                    <button class="geo-key" data-key="ფ">ფ</button>
                    <button class="geo-key" data-key="გ">გ</button>
                    <button class="geo-key" data-key="ჰ">ჰ</button>
                    <button class="geo-key" data-key="ჯ">ჯ</button>
                    <button class="geo-key" data-key="კ">კ</button>
                    <button class="geo-key" data-key="ლ">ლ</button>
                </div>
                <div class="geo-keyboard-row">
                    <button class="geo-key geo-key--action" data-action="submit">↵</button>
                    <button class="geo-key" data-key="ზ">ზ</button>
                    <button class="geo-key" data-key="ხ">ხ</button>
                    <button class="geo-key" data-key="ც">ც</button>
                    <button class="geo-key" data-key="ვ">ვ</button>
                    <button class="geo-key" data-key="ბ">ბ</button>
                    <button class="geo-key" data-key="ნ">ნ</button>
                    <button class="geo-key" data-key="მ">მ</button>
                    <button class="geo-key geo-key--action" data-action="backspace">⌫</button>
                </div>
                <div class="geo-keyboard-row">
                    <button class="geo-key" data-key="შ">შ</button>
                    <button class="geo-key" data-key="ჩ">ჩ</button>
                    <button class="geo-key" data-key="ჭ">ჭ</button>
                    <button class="geo-key" data-key="ღ">ღ</button>
                    <button class="geo-key" data-key="თ">თ</button>
                    <button class="geo-key" data-key="ჟ">ჟ</button>
                    <button class="geo-key" data-key="ძ">ძ</button>
                </div>
            </div>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}" src="/static/js/app.js"></script>
<script th:src="@{/js/wordle.js}" src="/static/js/wordle.js"></script>



<script th:src="@{/js/keyboard.js}" src="/static/js/keyboard.js"></script>
</body>
</html>

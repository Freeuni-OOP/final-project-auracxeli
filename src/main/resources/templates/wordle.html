<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Wordle</title>
    <link th:href="@{/css/styles.css}" href="/static/css/styles.css" rel="stylesheet"/>
    <link th:href="@{/css/wordle.css}" href="/static/css/wordle.css" rel="stylesheet"/>
</head>
<body>
<header class="site-header">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>
</header>
<main>
    <section class="container">
        <div th:if="${noPuzzle}">
            <p>დღეს სიტყვა არ არის დაგეგმილი.</p>
        </div>

        <div th:unless="${noPuzzle}">
            <p th:if="${error}" class="wordle-error" th:text="${error}"></p>

            <p th:if="${outcome != null and outcome.name() == 'WON'}" class="wordle-message win">გილოცავ! გამოიცანი სიტყვა!</p>
            <p th:if="${outcome != null and outcome.name() == 'LOST'}" class="wordle-message lose">
                წააგე. სიტყვა იყო: <span th:text="${revealedWord}"></span>
            </p>

            <div class="wordle-board" id="wordle-board" th:attr="data-active-row=${attemptsUsed}">
                <div class="wordle-row" th:each="row, rowStat : ${rows}" th:attr="data-row-index=${rowStat.index}">
                    <span class="t" th:each="tile : ${row}" th:class="${tile.cssClass}" th:text="${tile.letter}"></span>
                </div>
            </div>
            <div th:if="${readOnly}" class="wordle-result">
                <p class="wordle-attempts">
                    ცდები: <span id="attempts-used" th:text="${attemptsUsed}"></span>/<span id="max-attempts" th:text="${maxAttempts}"></span>
                </p>
                <button type="button" id="share-button" class="wordle-share-btn">გაზიარება</button>
                <p id="share-feedback" class="wordle-share-feedback" aria-live="polite"></p>
            </div>
            <p id="js-error" class="wordle-error" style="display:none;"></p>
            <form th:unless="${readOnly}" class="wordle-form" th:action="@{/wordle/guess}" method="post" novalidate>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" id="guess-input" name="guess"/>
            </form>
        </div>
    </section>
</main>
<script th:src="@{/js/app.js}" src="/static/js/app.js"></script>
<script th:inline="none">
    document.getElementById('share-button')?.addEventListener('click', getWordleEmoji);

    function getWordleEmoji() {
        const rows = document.querySelectorAll('#wordle-board .wordle-row');
        const lines = [];

        rows.forEach(function (row) {
            const tiles = row.querySelectorAll('.t');
            let line = '';
            let hasLetter = false;

            tiles.forEach(function (tile) {
                if (tile.classList.contains('g')) {
                    line += '🟩';
                    hasLetter = true;
                } else if (tile.classList.contains('y')) {
                    line += '🟨';
                    hasLetter = true;
                } else if (tile.classList.contains('x')) {
                    line += '⬜';
                    hasLetter = true;
                }
            });

            if (hasLetter) {
                lines.push(line);
            }
        });

        const attemptsUsed = document.getElementById('attempts-used').textContent;
        const maxAttempts = document.getElementById('max-attempts').textContent;
        const header = 'ცდები ' + attemptsUsed + '/' + maxAttempts;

        const grid = header + '\n\n' + lines.join('\n');
        const feedback = document.getElementById('share-feedback');

        navigator.clipboard.writeText(grid)
            .then(function () {
                feedback.textContent = 'დაკოპირდა!';
            })
            .catch(function () {
                feedback.textContent = 'კოპირება ვერ მოხერხდა';
            });
    }
</script>
<script th:inline="none">
    (function () {
        const board = document.getElementById('wordle-board');
        if (!board) return;

        const guessForm = document.getElementById('guess-form');
        if (!guessForm) return;

        const activeRowIndex = parseInt(board.dataset.activeRow, 10);
        const activeRow = board.querySelector('[data-row-index="' + activeRowIndex + '"]');
        if (!activeRow) return;

        const tiles = Array.from(activeRow.querySelectorAll('.t'));
        const guessInput = document.getElementById('guess-input');

        activeRow.classList.add('active-row');

        let letters = [];
        const georgianLetterPattern = /^[ა-ჰ]$/;

        function render() {
            tiles.forEach(function (tile, i) {
                tile.textContent = letters[i] ? letters[i].toUpperCase() : '';
            });
        }

        function typeLetter(letter) {
            if (georgianLetterPattern.test(letter) && letters.length < tiles.length) {
                letters.push(letter);
                render();
            }
        }

        function backspace() {
            if (letters.length > 0) {
                letters.pop();
                render();
            }
        }

        function submitGuess() {
            if (letters.length === tiles.length) {
                guessInput.value = letters.join('');
                guessForm.submit();
            }
        }

        window.wordleInput = {
            typeLetter: typeLetter,
            backspace: backspace,
            submitGuess: submitGuess
        };

        document.addEventListener('keydown', function (e) {
            if (e.key === 'Backspace') {
                e.preventDefault();
                backspace();
            } else if (e.key === 'Enter') {
                e.preventDefault();
                submitGuess();
            } else if (e.key.length === 1) {
                typeLetter(e.key);
            }
        });
    })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ka" xmlns:th="http://www.thymeleaf.org" th:attr="data-theme=${theme}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>მეგობრები</title>
    <link th:href="@{/css/styles.css}"  href="/static/css/styles.css"  rel="stylesheet" />
    <link th:href="@{/css/friends.css}" href="/static/css/friends.css" rel="stylesheet" />
</head>
<body>
<header class="site-header">
    <nav th:replace="~{fragments/navbar :: navbar('friends')}"></nav>
</header>

<main>
    <section class="friends container">
        <p class="flash" th:if="${message}" th:text="${message}"></p>
        <p class="flash error" th:if="${error}"   th:text="${error}"></p>
        <a th:href="@{/friends/leaderboard/wordle}" class="leaderboard-link">ლიდერბორდი</a>
        <form class="add-friend" th:action="@{/friends/request}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <input type="text" name="username" placeholder="მომხმარებლის სახელი" required />
            <button type="submit">მოთხოვნის გაგზავნა</button>
        </form>

        <section class="friend-block">
            <h2>მოთხოვნები</h2>
            <p class="empty" th:if="${pendingRequests.isEmpty()}">ახალი მოთხოვნები არ არის</p>
            <ul class="friend-list">
                <li th:each="req : ${pendingRequests}">
                    <span th:text="${req.requesterUsername}">user</span>
                    <span class="actions">
                        <form th:action="@{/friends/{id}/accept(id=${req.friendshipId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit">დადასტურება</button>
                        </form>
                        <form th:action="@{/friends/{id}/decline(id=${req.friendshipId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="danger">უარყოფა</button>
                        </form>
                    </span>
                </li>
            </ul>
        </section>

        <section class="friend-block">
            <h2>ჩემი მეგობრები</h2>
            <p class="empty" th:if="${friends.isEmpty()}">ჯერ მეგობრები არ გყავს</p>
            <ul class="friend-list">
                <li th:each="friend : ${friends}">
                    <span th:text="${friend.username}">user</span>
                    <span class="actions">
                        <form th:action="@{/friends/{id}/remove(id=${friend.friendshipId})}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="danger">წაშლა</button>
                        </form>
                    </span>
                </li>
            </ul>
        </section>
    </section>
</main>
</body>
</html>

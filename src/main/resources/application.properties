spring.application.name=final-project-auracxeli

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/auracxeli
spring.datasource.username=auracxeli
spring.datasource.password=auracxeli

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Logging levels. Adjust com.auracxeli to DEBUG/TRACE to see guess evaluation, lookups,
# and computed stats; INFO and above are shown for everything else. See logback-spring.xml
# for the dev (colored) vs prod (key=value) output formats. Overridable at runtime via
# -Dlogging.level.com.auracxeli=DEBUG or the LOGGING_LEVEL_COM_AURACXELI env var.
logging.level.root=INFO
logging.level.com.auracxeli=DEBUG